name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  create-release:
    timeout-minutes: 10
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes --title "$TAG"

  upload-assets:
    needs: create-release
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # Gate the release: the binary built below ships only if tests pass on
      # the host arch. x86_64-apple-darwin runs on the same arm64 macos-14
      # host as aarch64-apple-darwin; the Rust code is platform-agnostic so
      # the arm64 test result is a valid proxy for both Apple targets.
      - run: cargo test --locked
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: token-saver
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          checksum: sha256
          token: ${{ github.token }}

  bump-tap:
    needs: upload-assets
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREWTOKENSAVER }}
          TAG: ${{ github.ref_name }}
        run: bash scripts/update-tap.sh
